  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pytorch=2.5.1
  - torchaudio=2.5.1
  - pytorch-cuda=12.1
  - pip:
      - transformers>=4.46,<5
      - datasets>=3,<4
      - accelerate>=1,<2
      - evaluate>=0.4,<1
      - jiwer>=3,<4
      - webdataset>=0.2,<1
      - soundfile>=0.12,<1
      - librosa>=0.10,<1
      - pandas>=2,<3
      - numpy>=1.26,<3
      - matplotlib>=3.8,<4
      - tqdm>=4.66,<5
      - pyyaml>=6,<7
      - tensorboard>=2.17,<3
      - gdown>=5,<6
      # Optional: add pyctcdecode for language-model-assisted decoding.
